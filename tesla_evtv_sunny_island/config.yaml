name: Tesla EVTV BMS + Sunny Island
version: "1.1.0"
slug: tesla_evtv_sunny_island
description: EVTV Tesla BMS UDP, MQTT sensors, SMA closed-loop CAN, and CAN bus monitor
url: https://github.com/mobiletru/tesla_evtv_bms_v3
arch:
  - aarch64
  - amd64
  - armv7
startup: application
init: false
host_network: true
privileged:
  - NET_ADMIN
services:
  - mqtt:need
options:
  log_level: info
  udp_port: 6850
  can_interface: can0
  can_bitrate: 500000
  setup_can: true
  sma_enabled: true
  can_watch_enabled: true
  can_watch_filter: sma
  can_watch_mqtt: false
  can_watch_summary_interval: 30
  can_watch_device_name: sunny_island_can
  device_name: tesla_bms
  module_count: 36
  modules_in_series: 2
  min_cell_volts: 3.2
  max_cell_volts: 4.1
  charge_current_limit: 100
  discharge_current_limit: 100
  invert_current: false
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  udp_port: port
  can_interface: str
  can_bitrate: int
  setup_can: bool
  sma_enabled: bool
  can_watch_enabled: bool
  can_watch_filter: list(all|sma|bms)
  can_watch_mqtt: bool
  can_watch_summary_interval: int
  can_watch_device_name: str
  device_name: str
  module_count: int
  modules_in_series: int
  min_cell_volts: float
  max_cell_volts: float
  charge_current_limit: float
  discharge_current_limit: float
  invert_current: bool
